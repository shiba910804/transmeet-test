<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 400px;
            max-width: 90vw;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .role-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #fff3cd;
            color: #856404;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .role-icon {
            font-size: 24px;
            margin-right: 8px;
        }
        h1 {
            color: #0a2463;
            margin: 0;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-top: 0.5rem;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #0a2463;
            box-shadow: 0 0 0 2px rgba(10, 36, 99, 0.1);
        }
        button {
            background-color: #0a2463;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 1rem;
            font-weight: bold;
        }
        button:hover {
            background-color: #2c7db3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #dff0d8;
            color: #3c763d;
            border: 1px solid #d6e9c6;
        }
        .error {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #0a2463;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .connection-status {
            display: none;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.25rem;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        .teacher-note {
            background: #f8f9fa;
            border-left: 4px solid #0a2463;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 14px;
            color: #495057;
        }
        .teacher-note h3 {
            margin: 0 0 0.5rem 0;
            color: #0a2463;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="role-badge">
                <span class="role-icon">рҹ‘ЁвҖҚрҹҸ«</span>
                иҖҒеё« Teacher
            </div>
            <h1>Create Teacher Account</h1>
            <p class="subtitle">Join our platform to teach and inspire students</p>
        </div>
        <!-- йҖЈжҺҘзӢҖж…ӢжҢҮзӨәеҷЁ -->
        <div id="connection-status" class="connection-status">
            <span id="status-indicator" style="color: orange;">вҡ пёҸ жӘўжҹҘйҖЈжҺҘдёӯ...</span>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label for="teacher-id">Teacher ID</label>
                <input type="text" id="teacher-id" placeholder="Enter your teacher ID" required>
            </div>

            <div class="form-group">
                <label for="username">User Name</label>
                <input type="text" id="username" placeholder="Choose a user name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your professional email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password (min 6 characters)" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
            </div>

            <button type="button" id="signup-btn" onclick="signup()">Create Teacher Account</button>
            <div id="signup-message" class="message"></div>
        </form>

        <div class="back-link">
            <a href="auth.html">вҶҗ Back to Login</a>
            <br><br>
            <a href="student-signup.html">Register as Student</a>
        </div>
    </div>

    <script>
  // === еҹәжң¬иЁӯе®ҡ ===
  const API_BASE_URL = ''; // еҗҢз¶ІеҹҹеҸҜз•ҷз©әпјӣдёҚеҗҢз¶Іеҹҹи«ӢеЎ«е®Ңж•ҙ base url

  // е…ұз”ЁиЁҠжҒҜйЎҜзӨә
  function showMessage(id, msg, ok) {
    const el = document.getElementById(id);
    if (!el) return alert(msg);
    el.textContent = msg;
    el.className = ok ? 'message success' : 'message error';
    el.style.display = 'block';
    console.log(`${ok ? 'вң…' : 'вқҢ'} ${id}: ${msg}`);
  }

  // йҖҒеҮәжҢүйҲ• loading
  function setButtonLoading(loading) {
    const btn = document.getElementById('signup-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'иҷ•зҗҶдёӯ...' : 'Create Teacher Account';
  }

  // еҒҘеә·жӘўжҹҘпјҲй Ғйқўијүе…ҘжҷӮпјү
  window.addEventListener('load', async () => {
    const el = document.getElementById('status-indicator');
    const tryFetch = async (url) => {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    };
    try {
      let data;
      try {
        data = await tryFetch(`${API_BASE_URL}/health`);
      } catch (e) {
        if (String(e.message).includes('404')) {
          data = await tryFetch(`${API_BASE_URL}/api/health`);
        } else { throw e; }
      }
      el.textContent = 'вң… жңҚеӢҷеҷЁйҖЈжҺҘжӯЈеёё';
      el.style.color = 'green';
      console.log('жңҚеӢҷеҷЁзӢҖж…Ӣ:', data);
    } catch (err) {
      el.textContent = 'вқҢ жңҚеӢҷеҷЁйҖЈжҺҘеӨұж•—';
      el.style.color = 'red';
      showMessage('signup-message', `йҖЈжҺҘеӨұж•—: ${err.message}`, false);
    }
  });

  // иЎЁе–®йҖҒеҮәдё»жөҒзЁӢ
  async function signup(e) {
    e?.preventDefault?.();

    const teacherId = document.getElementById('teacher-id').value.trim();
    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirm-password').value;

    // еүҚз«Ҝй©—иӯү
    if (!teacherId || !username || !email || !password || !confirm) {
      showMessage('signup-message', 'и«ӢеЎ«еҜ«жүҖжңүеҝ…еЎ«ж¬„дҪҚ', false);
      return;
    }
    if (password !== confirm) {
      showMessage('signup-message', 'Passwords do not match', false);
      return;
    }
    if (password.length < 6) {
      showMessage('signup-message', 'еҜҶзўјиҮіе°‘йңҖиҰҒ6еҖӢеӯ—з¬Ұ', false);
      return;
    }

    setButtonLoading(true);
    showMessage('signup-message', 'жӯЈеңЁе»әз«ӢеёіиҷҹвҖҰ', true);

    try {
      const payload = {
        username,
        email,
        password,
        full_name: teacherId,
        role: 'teacher',
      };

      console.log('еҳ—и©ҰиЁ»еҶҠиҖҒеё«:', { username, email, teacherId });
      const resp = await fetch(`${API_BASE_URL}/api/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        credentials: 'include',
      });

      let data = {};
      try { data = await resp.json(); } catch (_) {}

      console.log('иЁ»еҶҠйҹҝжҮүзӢҖж…Ӣ:', resp.status);
      console.log('иЁ»еҶҠйҹҝжҮүж•ёж“ҡ:', data);

      if (resp.ok) {
        showMessage('signup-message', 'иЁ»еҶҠжҲҗеҠҹпјҢй©—иӯүдҝЎе·ІеҜ„еҮәпјҢи«ӢеүҚеҫҖдҝЎз®ұе®ҢжҲҗй©—иӯүеҶҚзҷ»е…ҘгҖӮ', true);
        setTimeout(() => { window.location.href = '/auth.html'; }, 2000);
      } else {
        let msg = data.error || 'Signup failed';
        const details = String(data.details || '');
        if (/users_username_key/i.test(details)) msg = 'Username already exists';
        if (/users_email_key/i.test(details)) msg = 'Email already exists';
        if (/SMTP_SEND_FAILED|ECONNREFUSED|ETIMEDOUT|EAUTH|ENOTFOUND/i.test(details+msg)) {
          msg = 'еҜ„йҖҒй©—иӯүдҝЎеӨұж•—пјҡи«ӢиҒҜзөЎзі»зөұз®ЎзҗҶе“ЎжӘўжҹҘ SMTP дјәжңҚеҷЁиЁӯе®ҡгҖӮ';
        }
        showMessage('signup-message', msg, false);
      }
    } catch (err) {
      console.error('иЁ»еҶҠи«ӢжұӮйҢҜиӘӨ:', err);
      showMessage('signup-message', `з¶Іи·ҜйҢҜиӘӨпјҡ${err.message}`, false);
    } finally {
      setButtonLoading(false);
    }
  }

  // з¶Ғе®ҡпјҡжҢүйҲ• & иЎЁе–® Enter йҖҒеҮә
  document.getElementById('signup-btn').addEventListener('click', signup);
  document.getElementById('signup-form').addEventListener('submit', signup);
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && e.target.closest('#signup-form')) {
      e.preventDefault();
      signup(e);
    }
  });
</script>


</body>
</html>
