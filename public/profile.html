<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>TransClass - 個人檔案</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 60px 0 0 0;
      background-color: #f5f5f5;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #0a2463;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 1000;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      font-weight: bold;
      font-size: 20px;
    }
    .container {
      margin: 0 auto;
      max-width: 800px;
      padding: 20px;
    }
    .profile-card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 30px;
      margin-top: 20px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #2c7db3;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-right: 20px;
    }
    .profile-info h2 {
      margin: 0 0 5px 0;
      color: #333;
    }
    .profile-info p {
      margin: 0;
      color: #666;
    }
    .profile-section {
      margin-bottom: 25px;
    }
    .profile-section h3 {
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      color: #333;
    }
    .profile-row {
      display: flex;
      margin-bottom: 15px;
    }
    .profile-label {
      width: 150px;
      color: #666;
    }
    .profile-value {
      flex: 1;
      color: #333;
    }
    .edit-btn {
      background-color: #FF9966;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    .edit-btn:hover {
      background-color: #ff8c52;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <div class="logo">TransClass</div>
    </div>
  </div>

  <div class="container">
    <h1>個人檔案</h1>
    
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar-large">U</div>
        <div class="profile-info">
          <h2 id="profile-username">使用者名稱</h2>
          <p id="profile-email">user@example.com</p>
        </div>
      </div>
      
      <div class="profile-section">
        <h3>基本資訊</h3>
        <div class="profile-row">
          <div class="profile-label">註冊日期</div>
          <div class="profile-value" id="profile-register-date">2025-01-01</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">最後登入</div>
          <div class="profile-value" id="profile-last-login">2025-08-06 15:30</div>
        </div>
      </div>
      
      <div class="profile-section">
        <h3>使用統計</h3>
        <div class="profile-row">
          <div class="profile-label">資料夾數量</div>
          <div class="profile-value" id="profile-folder-count">0</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">課程數量</div>
          <div class="profile-value" id="profile-meeting-count">0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Load user data from localStorage
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) {
        document.getElementById('profile-avatar-large').textContent = user.username.charAt(0).toUpperCase();
        document.getElementById('profile-username').textContent = user.username;
        document.getElementById('profile-email').textContent = user.email || '未設定';
        
        // Format dates if available
        if (user.createdAt) {
          const regDate = new Date(user.createdAt);
          document.getElementById('profile-register-date').textContent = 
            regDate.toLocaleDateString('zh-TW');
        }
        
        if (user.lastLogin) {
          const loginDate = new Date(user.lastLogin);
          document.getElementById('profile-last-login').textContent = 
            loginDate.toLocaleString('zh-TW');
        }
      }
      
      // Load stats (you would replace this with actual API calls)
      loadUserStats();
    });
    
    async function loadUserStats() {
      try {
        // In a real app, you would fetch these from your API
        // const response = await fetch('/api/user/stats');
        // const stats = await response.json();
        
        // For demo purposes, we'll use mock data
        const stats = {
          folderCount: 5,
          meetingCount: 12
        };
        
        document.getElementById('profile-folder-count').textContent = stats.folderCount;
        document.getElementById('profile-meeting-count').textContent = stats.meetingCount;
      } catch (error) {
        console.error('Failed to load user stats:', error);
      }
    }
  </script>
</body>
</html>
